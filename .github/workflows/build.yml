name: Build & Publish Addon

on:
  push:
    tags:
      - "v*"          # trigger on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # manual trigger from Actions tab

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64, armhf, armv7, i386]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Map HA arch to Docker platform
        id: platform
        run: |
          case "${{ matrix.arch }}" in
            amd64)   echo "PLATFORM=linux/amd64"   >> $GITHUB_OUTPUT ;;
            aarch64) echo "PLATFORM=linux/arm64"   >> $GITHUB_OUTPUT ;;
            armv7)   echo "PLATFORM=linux/arm/v7"  >> $GITHUB_OUTPUT ;;
            armhf)   echo "PLATFORM=linux/arm/v6"  >> $GITHUB_OUTPUT ;;
            i386)    echo "PLATFORM=linux/386"     >> $GITHUB_OUTPUT ;;
          esac

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./homie-proxy
          platforms: ${{ steps.platform.outputs.PLATFORM }}
          push: true
          tags: |
            ghcr.io/ctrlable/homie-proxy/${{ matrix.arch }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/ctrlable/homie-proxy/${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:latest
          labels: |
            io.hass.version=${{ steps.version.outputs.VERSION }}
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
